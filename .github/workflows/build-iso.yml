name: Build ISO

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
  release:
    types: [created]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso mtools make nasm

      - name: Set up Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          zig-version: master

      - name: Build release ISO
        run: |
          zig build iso -Doptimize=ReleaseSafe -Darch=${{ matrix.arch }}
          mv zigk.iso zscapek-${{ matrix.arch }}.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: zscapek-${{ matrix.arch }}
          path: zscapek-${{ matrix.arch }}.iso
