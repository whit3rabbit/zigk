serial --unit=0 --speed=115200
terminal_input serial
terminal_output serial
insmod all_video
set timeout=3
set default=0

menuentry "ZigK Microkernel" {
    multiboot2 /boot/kernel.bin
    module2 /boot/modules/shell.bin shell
    boot
}

menuentry "ZigK Microkernel (serial debug)" {
    multiboot2 /boot/kernel.bin
    module2 /boot/modules/shell.bin shell
    boot
}
