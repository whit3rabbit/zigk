# Zscapek Limine Bootloader Configuration
# Protocol: Limine Boot Protocol v5.x
# Reference: https://github.com/limine-bootloader/limine/blob/v5.x-branch/CONFIG.md

# Global settings
TIMEOUT=3
SERIAL=yes
VERBOSE=yes

# ------------------------------------------------------------------------------
# Main Operating System
# ------------------------------------------------------------------------------

# Zscapek Microkernel (Default)
:Zscapek Microkernel
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/modules/test_vdso
MODULE_CMDLINE=test_vdso

# Doom (requires doom1.wad inside initrd.tar)
:Doom
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/initrd.tar
MODULE_CMDLINE=initrd.tar
MODULE_PATH=boot:///boot/modules/doom.elf
MODULE_CMDLINE=doom -iwad /doom1.wad

# Debug Mode
:Zscapek (Debug)
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
CMDLINE=debug
MODULE_PATH=boot:///boot/modules/shell.elf
MODULE_CMDLINE=shell

