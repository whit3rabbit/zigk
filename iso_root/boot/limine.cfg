# ZigK Limine Bootloader Configuration
# Protocol: Limine Boot Protocol v5.x
# Reference: https://github.com/limine-bootloader/limine/blob/v5.x-branch/CONFIG.md

# Global settings
TIMEOUT=5
SERIAL=yes
VERBOSE=yes

# Main boot entry
:ZigK Microkernel
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/modules/shell.elf
MODULE_STRING=shell

# Debug entry
:ZigK (Debug)
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
CMDLINE=debug
MODULE_PATH=boot:///boot/modules/shell.elf
MODULE_STRING=shell
