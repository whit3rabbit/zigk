# Zscapek Limine Bootloader Configuration
# Protocol: Limine Boot Protocol v5.x
# Reference: https://github.com/limine-bootloader/limine/blob/v5.x-branch/CONFIG.md

# Global settings
TIMEOUT=1
SERIAL=yes
VERBOSE=yes

# Test Signals FPU (Default)
:Test Signals FPU
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/modules/test_signals_fpu
MODULE_CMDLINE=test_signals_fpu

# Doom (requires doom1.wad inside initrd.tar)
:Doom
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/initrd.tar
MODULE_CMDLINE=initrd.tar
MODULE_PATH=boot:///boot/modules/doom.elf
MODULE_CMDLINE=doom -iwad /doom1.wad
# Main boot entry (Default)

# UART Driver Test (Phase 3)
:UART Driver Test
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/modules/uart_driver.elf
MODULE_CMDLINE=uart_driver

# Zscapek Microkernel
:Zscapek Microkernel
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/modules/shell.elf
MODULE_CMDLINE=shell

# Debug entry
:Zscapek (Debug)
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
CMDLINE=debug
MODULE_PATH=boot:///boot/modules/shell.elf
MODULE_CMDLINE=shell

