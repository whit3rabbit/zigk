# Zscapek Limine Bootloader Configuration
# Protocol: Limine Boot Protocol v5.x
# Reference: https://github.com/limine-bootloader/limine/blob/v5.x-branch/CONFIG.md

# Global settings
TIMEOUT=0
SERIAL=yes
VERBOSE=yes

# Main boot entry (Default)
:Zscapek Microkernel
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/modules/shell.elf
MODULE_CMDLINE=shell

# Debug entry
:Zscapek (Debug)
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
CMDLINE=debug
MODULE_PATH=boot:///boot/modules/shell.elf
MODULE_CMDLINE=shell

# Linux Compatibility Tests
:Test stdio
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/modules/test_stdio
MODULE_CMDLINE=test_stdio

:Test devnull
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/modules/test_devnull
MODULE_CMDLINE=test_devnull

:Test wait4
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/modules/test_wait4
MODULE_CMDLINE=test_wait4

:Test clock
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/modules/test_clock
MODULE_CMDLINE=test_clock

:Test random
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/modules/test_random
MODULE_CMDLINE=test_random

:Test ASM (Minimal)
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/modules/test_asm
MODULE_CMDLINE=test_asm

# Doom (requires doom1.wad in initrd)
:Doom
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/initrd.tar
MODULE_CMDLINE=initrd
MODULE_PATH=boot:///boot/modules/doom.elf
MODULE_CMDLINE=doom

# Main boot entry
:Zscapek Microkernel
PROTOCOL=limine
KERNEL_PATH=boot:///boot/kernel.elf
MODULE_PATH=boot:///boot/modules/shell.elf
MODULE_CMDLINE=shell
