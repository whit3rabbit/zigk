# ZigK Limine Bootloader Configuration
# Protocol: Limine Boot Protocol v5.x
# Reference: https://github.com/limine-bootloader/limine/blob/v5.x-branch/CONFIG.md

# Boot timeout (seconds) - increased for debugging
timeout: 10

# Serial output for debugging (COM1)
serial: yes

# Verbose logging
verbose: yes

# Main boot entry
/ZigK Microkernel
    protocol: limine
    kernel_path: boot():/boot/kernel.elf
    kernel_cmdline:

    # Shell module loaded as InitRD
    module_path: boot():/boot/modules/shell.bin
    module_cmdline: shell

# Debug entry with verbose output
/ZigK (Debug)
    protocol: limine
    kernel_path: boot():/boot/kernel.elf
    kernel_cmdline: debug
    module_path: boot():/boot/modules/shell.bin
    module_cmdline: shell
